# ==========================================
# Configurações da Aplicação
# Motor de Liberação de Crédito
# ==========================================

spring:

  application:
    name: motor-liberacao-credito

  # ------------------------------------------
  # Configurações do Banco de Dados H2 em Memória
  # ------------------------------------------
  datasource:
    url: jdbc:h2:mem:creditodb
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  # ------------------------------------------
  # Console H2 (acesso via browser)
  # URL: http://localhost:8080/h2-console
  # ------------------------------------------
  h2:
    console:
      enabled: true
      path: /h2-console

  # ------------------------------------------
  # JPA / Hibernate
  # ------------------------------------------
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update   # Cria as tabelas ao iniciar e remove ao encerrar
    show-sql: true             # Exibe as queries SQL geradas no console
    properties:
      hibernate:
        format_sql: true

# ------------------------------------------
# Configurações do Servidor
# ------------------------------------------
server:
  port: 8080

